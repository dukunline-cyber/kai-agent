# Dev tooling config for the Hermes crypto scripts.
# The runtime scripts themselves are dependency-light templates; this file only
# configures linting/formatting/testing for contributors.

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["scripts", "tests"]

[tool.ruff.lint]
# Sensible default rule set for these scripts.
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # long lines tolerated in ABI/data literals
    "E701",   # multiple statements on one line (used in compact SQL builders)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # imports after _bootstrap is intentional
